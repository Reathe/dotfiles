# vim: ft=yaml:
packages:
  linux:
    brewtap:
      - "wez/wezterm-linuxbrew"
    brew:
      - "gcc"
      - "nushell"
      - "neovim"
      - "git"
      - "lazygit"
      - "gh"
      - "make"
      - "unzip"
      - "ripgrep"
      - "carapace"
      - "zoxide"
      - "fzf"
      - "fd"
      - "tldr"
      - "kanata"
      - "starship"
      - "bat"
      # install from taps
      - "wezterm"
      # TODO: uv tldr>tlrc

  windows:
    winget:
      - "jtroo.kanata_gui" # kanata keyboard homerow
      - "git.git"
      - "GitHub.cli" # gh command for auth
      - "JesseDuffield.lazygit" # git gui
      - "Neovim.Neovim" # nvim editor
      - "Nushell.Nushell" # best shell
      - "rsteube.Carapace" # autocompletion
      - "ajeetdsouza.zoxide" # better cd
      - "tldr-pages.tlrc" # tldr command manual
      - "Starship.Starship" # pretty prompt
      - "wez.wezterm.nightly" # terminal
      - "sharkdp.bat" # pretty cat command
      - "BurntSushi.ripgrep.MSVC" # for fiding files fast (find files with ␣␣ in nvim)
      - "BrechtSanders.WinLibs.POSIX.UCRT" # C compiler for tree-sitter
      - "astral-sh.uv" # Python manager and more
      - "OpenJS.NodeJS" # Needed for installing different mason tools
      - "ImageMagick.ImageMagick.Q8" # converting png to other format for snacks.image
    wingetExtras:
      - "AntibodySoftware.WizTree"
      - "voidtools.Everything"
      - "Microsoft.VisualStudioCode"
      - "Zen-Team.Zen-Browser"
    wingetArgs:
      - "Chocolatey.Chocolatey"
    choco:
      - "nerd-fonts-jetbrainsmono"
      - "tree-sitter" # parser for nvim shit
    custom:
      - "uv python install --default --preview" # install python
